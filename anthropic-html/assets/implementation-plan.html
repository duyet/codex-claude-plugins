<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implementation Plan - Artifact</title>
<style>
  :root {
    --ivory: #FAF9F5; --paper: #FFFFFF; --slate: #141413; --clay: #D97757;
    --oat: #E3DACC; --olive: #788C5D; --rust: #B04A3F;
    --g100: #F0EEE6; --g200: #E6E3DA; --g300: #D1CFC5; --g500: #87867F; --g700: #3D3D3A;
    --sans: system-ui, -apple-system, sans-serif; --mono: ui-monospace, "SF Mono", monospace;
  }
  body { background: var(--ivory); color: var(--slate); font-family: var(--sans); line-height: 1.5; padding: 40px 20px; }
  .page { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 32px; margin-bottom: 24px; }
  
  .timeline { position: relative; padding: 20px 0; margin-bottom: 40px; }
  .timeline::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: var(--g200); }
  .milestone { position: relative; padding-left: 50px; margin-bottom: 30px; }
  .milestone::after { content: ''; position: absolute; left: 16px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--paper); border: 2px solid var(--clay); z-index: 1; }
  .milestone.done::after { background: var(--olive); border-color: var(--olive); }
  .m-date { font-family: var(--mono); font-size: 12px; color: var(--g500); }
  .m-title { font-weight: 600; font-size: 18px; margin: 2px 0; }
  
  .matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--g300); border: 1px solid var(--g300); border-radius: 8px; overflow: hidden; margin-top: 24px; }
  .m-cell { background: var(--paper); padding: 12px; min-height: 60px; }
  .m-header { background: var(--g100); font-weight: 600; font-size: 12px; text-align: center; padding: 8px; }
  .high { background: rgba(176, 74, 63, 0.05); }
</style>
</head>
<body>
<div class="page">
  <div class="mono text-small" style="color:var(--g500)">STRATEGIC PLAN</div>
  <h1>Feature Launch: Global CDN Edge</h1>
  
  <div class="timeline">
    <div class="milestone done">
      <div class="m-date">WEEK 1</div>
      <div class="m-title">Infrastructure Audit</div>
      <p>Assess existing edge locations and capacity.</p>
    </div>
    <div class="milestone">
      <div class="m-date">WEEK 2-3</div>
      <div class="m-title">Beta Deployment</div>
      <p>Deploy to test regions (US-East, EU-West).</p>
    </div>
  </div>

  <h2>Risk Assessment</h2>
  <div class="matrix">
    <div class="m-header">Low Impact</div><div class="m-header">Med Impact</div><div class="m-header">High Impact</div>
    <div class="m-cell">UI Glitches</div><div class="m-cell">Minor Latency</div><div class="m-cell high">Data Loss</div>
  </div>
</div>
</body>
</html>
